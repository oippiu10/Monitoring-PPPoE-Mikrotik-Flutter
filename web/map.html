<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Map — Mikrotik PPPoE Monitor</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <style>
        .map-layout { display: flex; height: calc(100vh - var(--topbar-height)); }
        #mapContainer { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; background: var(--bg-primary); }
        .map-sidebar {
            width: 320px; background: var(--bg-card); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .map-sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
        .map-sidebar-header h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
        .map-filter { margin-bottom: 8px; }
        .odp-list { flex: 1; overflow-y: auto; padding: 8px; }
        .odp-item {
            padding: 10px 12px; border-radius: var(--radius-md); cursor: pointer;
            margin-bottom: 4px; transition: var(--transition); border: 1px solid transparent;
        }
        .odp-item:hover { background: var(--bg-card-hover); }
        .odp-item.selected { background: var(--primary-glow); border-color: var(--primary); }
        .odp-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .odp-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .odp-stats { display: flex; gap: 8px; margin-top: 6px; }
        .map-stats-bar { display: flex; gap: 16px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg-sidebar); }
        .map-stat { text-align: center; flex: 1; }
        .map-stat-val { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .map-stat-label { font-size: 11px; color: var(--text-muted); }
        .map-legend {
            position: absolute; bottom: 20px; left: 20px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px;
            z-index: 1000; box-shadow: var(--shadow-md);
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        @media(max-width:768px){ .map-sidebar{ display:none; } }
    </style>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo-placeholder"><i class="fas fa-network-wired"></i></div>
            <div class="sidebar-title"><h2>PPPoE Monitor</h2><p>Web Admin Panel</p></div>
        </div>
        <nav class="sidebar-nav">
            <span class="nav-section-label">Menu Utama</span>
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span class="nav-label">Dashboard</span></a>
            <a href="users.html" class="nav-item"><i class="fas fa-users"></i><span class="nav-label">User Management</span></a>
            <a href="billing.html" class="nav-item"><i class="fas fa-money-bill-wave"></i><span class="nav-label">Billing</span></a>
            <a href="monitoring.html" class="nav-item"><i class="fas fa-chart-line"></i><span class="nav-label">Monitoring</span></a>
            <a href="map.html" class="nav-item active"><i class="fas fa-map-marked-alt"></i><span class="nav-label">Customer Map</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-file-alt"></i><span class="nav-label">Reports</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span class="nav-label">Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar" id="userAvatarLetter">A</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarUserName">Admin</div>
                    <div class="sidebar-user-role">Administrator</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div>
                    <h1>Customer Map</h1>
                    <div class="topbar-breadcrumb">Peta sebaran pelanggan per ODP</div>
                </div>
            </div>
            <div class="topbar-right">
                <button class="btn-icon" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                <button class="btn btn-outline btn-sm" onclick="locateMe()"><i class="fas fa-location-arrow"></i> Lokasi Saya</button>
            </div>
        </header>

        <!-- Map + Sidebar Layout -->
        <div class="map-layout">
            <div id="mapContainer">
                <div id="map"></div>
                <div class="map-legend">
                    <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;">Legenda</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Online / Aktif</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Offline</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> ODP Point</div>
                </div>
            </div>

            <div class="map-sidebar">
                <div class="map-sidebar-header">
                    <h3><i class="fas fa-map-marker-alt" style="color:var(--warning);margin-right:6px"></i>Daftar ODP</h3>
                    <div class="map-filter">
                        <div class="filter-search" style="height:34px">
                            <i class="fas fa-search"></i>
                            <input type="text" id="odpSearch" placeholder="Cari ODP..." oninput="filterODP()">
                        </div>
                    </div>
                </div>
                <div class="odp-list" id="odpList">
                    <div class="loading-overlay"><div class="loading-spinner"></div> Memuat ODP...</div>
                </div>
                <div class="map-stats-bar">
                    <div class="map-stat"><div class="map-stat-val" id="mapStatTotal">—</div><div class="map-stat-label">Total ODP</div></div>
                    <div class="map-stat"><div class="map-stat-val" id="mapStatUsers">—</div><div class="map-stat-label">Pelanggan</div></div>
                    <div class="map-stat"><div class="map-stat-val" id="mapStatOnline" style="color:var(--success)">—</div><div class="map-stat-label">Online</div></div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let map, markerCluster;
let allODPs = [];
let markers = {};

function init() {
    loadTheme();
    try {
        const u = JSON.parse(sessionStorage.getItem('userInfo') || '{}');
        document.getElementById('sidebarUserName').textContent = u.full_name || u.username || 'Admin';
        document.getElementById('userAvatarLetter').textContent = (u.full_name || u.username || 'A').charAt(0).toUpperCase();
    } catch(e) {}
    initMap();
    loadODPs();
}

function initMap() {
    // Default center - Indonesia
    map = L.map('map', { center: [-7.5, 110.0], zoom: 12, zoomControl: false });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Tile layer - dark style
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 19
    }).addTo(map);

    // Marker cluster
    markerCluster = L.markerClusterGroup({
        maxClusterRadius: 60,
        iconCreateFunction: (cluster) => {
            const count = cluster.getChildCount();
            return L.divIcon({
                html: `<div style="background:var(--primary);color:white;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:3px solid rgba(79,142,247,0.4)">${count}</div>`,
                className: '',
                iconSize: [36, 36]
            });
        }
    });
    map.addLayer(markerCluster);
}

async function loadODPs() {
    try {
        const res = await fetch('../../api/odp_operations.php?action=list');
        const data = await res.json();
        if (data.success && data.data && data.data.length > 0) {
            allODPs = data.data;
            renderODPList(allODPs);
            plotMarkers(allODPs);
            updateMapStats(allODPs);
        } else {
            document.getElementById('odpList').innerHTML = `<div class="empty-state" style="padding:24px"><i class="fas fa-map-marker-alt" style="font-size:30px"></i><h4>Tidak ada ODP</h4><p>Tambah ODP di aplikasi mobile</p></div>`;
        }
    } catch(e) {
        document.getElementById('odpList').innerHTML = `<div class="empty-state" style="padding:24px"><i class="fas fa-plug" style="font-size:30px"></i><h4>Gagal memuat</h4><p>Tidak dapat terhubung ke server</p></div>`;
    }
}

function renderODPList(odps) {
    const el = document.getElementById('odpList');
    if (!odps.length) {
        el.innerHTML = `<div class="empty-state" style="padding:24px"><i class="fas fa-search" style="font-size:30px"></i><p>Tidak ditemukan</p></div>`;
        return;
    }
    el.innerHTML = odps.map(odp => {
        const userCount = odp.user_count || 0;
        const online = odp.online_count || 0;
        return `
        <div class="odp-item" onclick="flyToODP(${odp.id}, ${odp.latitude}, ${odp.longitude})" id="odp-item-${odp.id}">
            <div class="odp-name"><i class="fas fa-broadcast-tower" style="color:var(--warning);margin-right:6px"></i>${escHtml(odp.nama || odp.name)}</div>
            <div class="odp-meta">${escHtml(odp.lokasi || odp.location || '—')}</div>
            <div class="odp-stats">
                <span class="badge badge-primary">${userCount} user</span>
                <span class="badge badge-success">${online} online</span>
                <span class="badge badge-secondary">${odp.kapasitas || '?'} port</span>
            </div>
        </div>`;
    }).join('');
}

function plotMarkers(odps) {
    markerCluster.clearLayers();
    markers = {};

    odps.forEach(odp => {
        const lat = parseFloat(odp.latitude);
        const lng = parseFloat(odp.longitude);
        if (isNaN(lat) || isNaN(lng)) return;

        const online = odp.online_count || 0;
        const total = odp.user_count || 0;
        const color = online > 0 ? '#f59e0b' : '#94a3b8';

        const icon = L.divIcon({
            html: `<div style="position:relative">
                <div style="background:${color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;border:3px solid rgba(255,255,255,0.3);box-shadow:0 2px 8px rgba(0,0,0,0.3)">
                    <i class="fas fa-broadcast-tower" style="font-size:12px"></i>
                </div>
                <div style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:white;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;${total===0?'display:none':''}">
                    ${total}
                </div>
            </div>`,
            className: '',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        const marker = L.marker([lat, lng], { icon });
        marker.bindPopup(`
            <div style="min-width:200px;font-family:Inter,sans-serif">
                <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:#1e293b">
                    <i class="fas fa-broadcast-tower" style="color:#f59e0b"></i> ${escHtml(odp.nama || odp.name)}
                </div>
                <div style="font-size:12px;color:#475569;margin-bottom:6px">${escHtml(odp.lokasi || '—')}</div>
                <hr style="border-color:#e2e8f0;margin:8px 0">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
                    <div><span style="color:#94a3b8">Total User</span><br><strong>${total}</strong></div>
                    <div><span style="color:#94a3b8">Online</span><br><strong style="color:#22c55e">${online}</strong></div>
                    <div><span style="color:#94a3b8">Kapasitas</span><br><strong>${odp.kapasitas || '?'} port</strong></div>
                </div>
            </div>
        `);

        markers[odp.id] = marker;
        markerCluster.addLayer(marker);
    });
}

function flyToODP(id, lat, lng) {
    document.querySelectorAll('.odp-item').forEach(el => el.classList.remove('selected'));
    document.getElementById(`odp-item-${id}`)?.classList.add('selected');

    if (!isNaN(lat) && !isNaN(lng)) {
        map.flyTo([lat, lng], 16, { animate: true, duration: 1 });
        setTimeout(() => {
            if (markers[id]) {
                markerCluster.zoomToShowLayer(markers[id], () => markers[id].openPopup());
            }
        }, 1200);
    }
}

function filterODP() {
    const q = document.getElementById('odpSearch').value.toLowerCase();
    const filtered = allODPs.filter(o => (o.nama || o.name || '').toLowerCase().includes(q) || (o.lokasi || '').toLowerCase().includes(q));
    renderODPList(filtered);
}

function updateMapStats(odps) {
    const totalUsers = odps.reduce((s, o) => s + (o.user_count || 0), 0);
    const totalOnline = odps.reduce((s, o) => s + (o.online_count || 0), 0);
    document.getElementById('mapStatTotal').textContent = odps.length;
    document.getElementById('mapStatUsers').textContent = totalUsers;
    document.getElementById('mapStatOnline').textContent = totalOnline;
}

function locateMe() {
    if (!navigator.geolocation) { showToast('Error', 'Geolokasi tidak didukung browser ini', 'error'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        map.flyTo([pos.coords.latitude, pos.coords.longitude], 15, { animate: true });
        L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
            radius: 10, fillColor: '#4f8ef7', color: '#fff', weight: 2, fillOpacity: 0.8
        }).addTo(map).bindPopup('Lokasi Anda').openPopup();
        showToast('Lokasi', 'Menampilkan lokasi Anda di peta', 'success');
    }, () => showToast('Error', 'Tidak dapat mengakses lokasi', 'error'));
}

function loadTheme() { if(localStorage.getItem('theme')==='light'){document.body.classList.add('light-theme');document.getElementById('themeIcon').className='fas fa-sun';} }
function toggleTheme(){ document.body.classList.toggle('light-theme');const l=document.body.classList.contains('light-theme');document.getElementById('themeIcon').className=l?'fas fa-sun':'fas fa-moon';localStorage.setItem('theme',l?'light':'dark'); }
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('show');}
document.addEventListener('click',e=>{if(window.innerWidth<=768&&!document.getElementById('sidebar').contains(e.target)&&!e.target.closest('.mobile-menu-toggle'))document.getElementById('sidebar').classList.remove('show');});
async function logout(){if(!confirm('Yakin logout?'))return;try{await fetch('api/auth/logout.php',{method:'POST'});}catch(e){}sessionStorage.clear();window.location.href='login.html';}
function showToast(title,msg,type='info'){const icons={success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<i class="fas ${icons[type]} toast-icon"></i><div class="toast-content"><div class="toast-title">${title}</div>${msg?`<div class="toast-message">${msg}</div>`:''}</div><button class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`;document.getElementById('toastContainer').appendChild(t);setTimeout(()=>t.remove(),4000);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
